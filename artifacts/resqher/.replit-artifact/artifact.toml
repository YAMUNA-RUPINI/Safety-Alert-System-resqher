kind = "web"
previewPath = "/"
title = "RESQHER – AI Women Safety Emergency System"
version = "1.0.0"
id = "artifacts/resqher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22687

[services.development]
run = "pnpm --filter @workspace/resqher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resqher", "run", "build" ]
publicDir = "artifacts/resqher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22687"
BASE_PATH = "/"
